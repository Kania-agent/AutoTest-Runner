<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTest Runner - Test Case Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚡ AutoTest Runner</h1>
        <p class="subtitle">Paste JavaScript code → Generate & run test cases instantly</p>
    </header>

    <main class="container">
        <section class="input-section">
            <div class="panel">
                <h2>📝 Source Function</h2>
                <textarea id="codeInput" placeholder="Paste your JavaScript function here...

Example:
function add(a, b) {
  return a + b;
}

function isEven(n) {
  return n % 2 === 0;
}"></textarea>
                <div class="button-row">
                    <button id="analyzeBtn" class="btn primary">🔍 Analyze & Generate Tests</button>
                    <button id="clearBtn" class="btn secondary">🗑️ Clear</button>
                </div>
            </div>
        </section>

        <section class="results-section" id="resultsSection" style="display:none;">
            <div class="tabs">
                <button class="tab active" data-tab="generated">Generated Tests</button>
                <button class="tab" data-tab="results">Test Results</button>
                <button class="tab" data-tab="coverage">Coverage</button>
            </div>

            <div class="tab-content active" id="tab-generated">
                <div class="panel">
                    <div class="button-row">
                        <button id="runTestsBtn" class="btn primary">▶️ Run Tests</button>
                        <button id="exportBtn" class="btn secondary">📥 Export Test File</button>
                        <button id="copyBtn" class="btn secondary">📋 Copy</button>
                    </div>
                    <pre id="generatedCode" class="code-output"></pre>
                </div>
            </div>

            <div class="tab-content" id="tab-results">
                <div class="panel">
                    <div id="testSummary" class="summary-bar"></div>
                    <div id="testResults"></div>
                </div>
            </div>

            <div class="tab-content" id="tab-coverage">
                <div class="panel">
                    <div id="coverageDisplay"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
